name: logpane
description: Lightweight analytics and error tracking SDK for Flutter. Self-hosted, privacy-friendly.
version: 1.0.0
homepage: https://logpane.dev
repository: https://github.com/gillmer-industries/logpane

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  device_info_plus: ^10.0.0
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.0
  sqflite: ^2.3.0
  shared_preferences: ^2.2.0
  uuid: ^4.0.0
  http: ^1.2.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.0
